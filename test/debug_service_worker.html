<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOSee Service Worker Debug</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .section {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            border-color: #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            border-color: #bee5eb;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            cursor: pointer;
        }
        textarea {
            width: 100%;
            height: 200px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>DOSee Service Worker Debug Tool</h1>
    
    <div class="section info">
        <h2>Service Worker Support Check</h2>
        <p id="supportStatus">Checking if service workers are supported...</p>
    </div>
    
    <div class="section" id="registrationSection" style="display: none;">
        <h2>Service Worker Registration</h2>
        <p id="registrationStatus">Attempting to register service worker...</p>
        <button id="registerBtn">Register Service Worker</button>
        <button id="unregisterBtn">Unregister Service Worker</button>
        <button id="checkBtn">Check Registration Status</button>
    </div>
    
    <div class="section" id="debugSection" style="display: none;">
        <h2>Debug Information</h2>
        <textarea id="debugOutput" readonly></textarea>
        <button id="clearBtn">Clear Output</button>
    </div>
    
    <div class="section">
        <h2>Manual Test</h2>
        <button id="testPathBtn">Test Service Worker Path</button>
        <button id="testFetchBtn">Test Fetch from Root</button>
        <div id="manualTestResults"></div>
    </div>

    <script>
        // Debug logging function
        function log(message, type = 'log') {
            const debugOutput = document.getElementById('debugOutput');
            const timestamp = new Date().toISOString();
            debugOutput.value += `[${timestamp}] [${type.toUpperCase()}] ${message}\n`;
            debugOutput.scrollTop = debugOutput.scrollHeight;
        }
        
        // Check service worker support
        document.addEventListener('DOMContentLoaded', function() {
            const supportStatus = document.getElementById('supportStatus');
            const registrationSection = document.getElementById('registrationSection');
            const debugSection = document.getElementById('debugSection');
            
            if ('serviceWorker' in navigator) {
                supportStatus.textContent = '✅ Service Workers are supported in this browser';
                supportStatus.parentElement.className = 'section success';
                registrationSection.style.display = 'block';
                debugSection.style.display = 'block';
                
                // Check current registration
                checkRegistrationStatus();
            } else {
                supportStatus.textContent = '❌ Service Workers are NOT supported in this browser';
                supportStatus.parentElement.className = 'section error';
            }
            
            // Set up button event listeners
            document.getElementById('registerBtn').addEventListener('click', registerServiceWorker);
            document.getElementById('unregisterBtn').addEventListener('click', unregisterServiceWorker);
            document.getElementById('checkBtn').addEventListener('click', checkRegistrationStatus);
            document.getElementById('clearBtn').addEventListener('click', function() {
                document.getElementById('debugOutput').value = '';
            });
            document.getElementById('testPathBtn').addEventListener('click', testServiceWorkerPath);
            document.getElementById('testFetchBtn').addEventListener('click', testFetchFromRoot);
        });
        
        function checkRegistrationStatus() {
            log('Checking current service worker registration...');
            
            navigator.serviceWorker.getRegistration().then(registration => {
                const registrationStatus = document.getElementById('registrationStatus');
                
                if (registration) {
                    const activeWorker = registration.active;
                    const waitingWorker = registration.waiting;
                    const installingWorker = registration.installing;
                    
                    let status = `✅ Service Worker Registered\n`;
                    status += `Scope: ${registration.scope}\n`;
                    status += `Active: ${activeWorker ? 'Yes' : 'No'}\n`;
                    
                    if (activeWorker) {
                        status += `Active State: ${activeWorker.state}\n`;
                        status += `Active Script URL: ${activeWorker.scriptURL}\n`;
                    }
                    
                    if (waitingWorker) {
                        status += `Waiting Worker: Yes (State: ${waitingWorker.state})\n`;
                    }
                    
                    if (installingWorker) {
                        status += `Installing Worker: Yes (State: ${installingWorker.state})\n`;
                    }
                    
                    registrationStatus.textContent = status;
                    registrationStatus.parentElement.className = 'section success';
                    
                    log(`Service worker registered: ${registration.scope}`);
                    if (activeWorker) {
                        log(`Active worker script URL: ${activeWorker.scriptURL}`);
                    }
                    
                } else {
                    registrationStatus.textContent = '❌ No service worker registered';
                    registrationStatus.parentElement.className = 'section error';
                    log('No service worker currently registered');
                }
            }).catch(error => {
                log(`Error checking registration: ${error}`, 'error');
            });
        }
        
        function registerServiceWorker() {
            log('Attempting to register service worker...');
            
            const registrationStatus = document.getElementById('registrationStatus');
            registrationStatus.textContent = 'Registering service worker...';
            registrationStatus.parentElement.className = 'section info';
            
            // Try different paths
            const pathsToTry = [
                '/sw.js',
                './sw.js',
                'sw.js',
                '/build/sw.js'
            ];
            
            function tryNextPath(index) {
                if (index >= pathsToTry.length) {
                    registrationStatus.textContent = '❌ All registration paths failed';
                    registrationStatus.parentElement.className = 'section error';
                    log('All service worker registration paths failed', 'error');
                    return;
                }
                
                const path = pathsToTry[index];
                log(`Trying to register service worker from: ${path}`);
                
                navigator.serviceWorker.register(path, { scope: '/' })
                    .then(registration => {
                        registrationStatus.textContent = `✅ Successfully registered from: ${path}`;
                        registrationStatus.parentElement.className = 'section success';
                        log(`Successfully registered service worker from ${path}`, 'success');
                        log(`Scope: ${registration.scope}`);
                        
                        // Check if the service worker is controlling the page
                        if (navigator.serviceWorker.controller) {
                            log('Service worker is controlling the page');
                        } else {
                            log('Service worker is registered but not yet controlling the page');
                        }
                    })
                    .catch(error => {
                        log(`Failed to register from ${path}: ${error}`, 'error');
                        tryNextPath(index + 1);
                    });
            }
            
            tryNextPath(0);
        }
        
        function unregisterServiceWorker() {
            log('Attempting to unregister service worker...');
            
            navigator.serviceWorker.getRegistration().then(registration => {
                if (registration) {
                    registration.unregister().then(success => {
                        if (success) {
                            log('Service worker unregistered successfully', 'success');
                            checkRegistrationStatus();
                        } else {
                            log('Service worker unregistration failed', 'error');
                        }
                    });
                } else {
                    log('No service worker to unregister', 'info');
                }
            });
        }
        
        function testServiceWorkerPath() {
            log('Testing service worker path availability...');
            
            const pathsToTest = [
                '/sw.js',
                './sw.js',
                'sw.js',
                '/build/sw.js'
            ];
            
            const resultsDiv = document.getElementById('manualTestResults');
            resultsDiv.innerHTML = '<h3>Path Test Results</h3>';
            
            pathsToTest.forEach(path => {
                const testDiv = document.createElement('div');
                testDiv.textContent = `Testing: ${path}`;
                resultsDiv.appendChild(testDiv);
                
                fetch(path, { method: 'HEAD', cache: 'no-store' })
                    .then(response => {
                        testDiv.textContent += ` - ✅ ${response.status} ${response.statusText}`;
                        testDiv.style.color = 'green';
                        log(`Path ${path} is accessible: ${response.status}`, 'success');
                    })
                    .catch(error => {
                        testDiv.textContent += ` - ❌ ${error.message}`;
                        testDiv.style.color = 'red';
                        log(`Path ${path} is not accessible: ${error.message}`, 'error');
                    });
            });
        }
        
        function testFetchFromRoot() {
            log('Testing fetch from root path...');
            
            fetch('/', { method: 'HEAD', cache: 'no-store' })
                .then(response => {
                    log(`Root path fetch successful: ${response.status}`, 'success');
                    document.getElementById('manualTestResults').innerHTML += `<p>✅ Root path accessible</p>`;
                })
                .catch(error => {
                    log(`Root path fetch failed: ${error.message}`, 'error');
                    document.getElementById('manualTestResults').innerHTML += `<p>❌ Root path not accessible: ${error.message}</p>`;
                });
        }
        
        // Auto-check registration on load
        window.addEventListener('load', function() {
            setTimeout(checkRegistrationStatus, 1000);
        });
    </script>
</body>
</html>
