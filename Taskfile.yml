# Task runner for DOSee - MS-DOS Emulator for the Web
# =================================================
#
# This task runner requires Task to be installed.
# https://taskfile.dev/#/installation
#
version: '3'

silent: true

vars:
  REQNPM: 'task requires Node.js and pnpm: https://pnpm.io'
  REQPNPM: 'task requires pnpm: https://pnpm.io'
  BUILD_DIR: 'build'
  SRC_DIR: 'src'

tasks:
  default:
    desc: List the available tasks.
    aliases: [help]
    hidden: true
    cmds:
      - task --list

  # Build tasks
  build:
    desc: Build DOSee for production.
    aliases: [b]
    preconditions:
      - sh: node -v
        msg: '{{.REQNPM}}'
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - mkdir -p {{.BUILD_DIR}}
      - pnpm run install
      - echo "DOSee built successfully in {{.BUILD_DIR}} directory"

  # System checks
  checks:
    desc: Check system versions.
    aliases: [v]
    cmds:
      - echo "System Information:"
      - node --version
      - pnpm --version

  # Clean tasks
  clean:
    desc: Clean build directory.
    aliases: [c]
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - mkdir -p {{.BUILD_DIR}}

  # Development tasks
  dev:
    desc: Development mode - build and serve.
    aliases: [d]
    cmds:
      - task: build
      - task: serve

  # Format tasks
  format:
    desc: Format code using Prettier.
    aliases: [f]
    cmds:
      - pnpm exec prettier --write .
      - echo "Code formatting completed"

  # Installation tasks
  install:
    desc: Install dependencies and build DOSee.
    aliases: [i]
    preconditions:
      - sh: node -v
        msg: '{{.REQNPM}}'
      - sh: pnpm -v
        msg: '{{.REQNPM}}'
    cmds:
      - pnpm install
      - task: build

  # Linting tasks
  lint:
    desc: Run ESLint on JavaScript files.
    aliases: [l]
    cmds:
      - pnpm exec eslint src/js/*.js || echo "ESLint found issues that need to be fixed"

  lint-fix:
    desc: Run ESLint and automatically fix fixable issues.
    aliases: [lf]
    cmds:
      - pnpm exec eslint src/js/*.js --fix
      - echo "ESLint fixes applied. Please review the changes."

  # DOS program management
  list-programs:
    desc: List available DOS programs.
    aliases: [lp]
    cmds:
      - ls -la {{.SRC_DIR}}/dos_programs/

  # Package management tasks
  packages-latest:
    desc: Interactively update to the latest dependencies.
    aliases: [pl]
    preconditions:
      - sh: pnpm -v
        msg: '{{.REQPNPM}}'
    cmds:
      - pnpm update --interactive --latest

  packages-update:
    desc: Update all dependencies to the latest versions.
    aliases: [pu]
    preconditions:
      - sh: pnpm -v
        msg: '{{.REQPNPM}}'
    cmds:
      - pnpm update

  # Server tasks
  serve:
    desc: Serve DOSee on localhost:8086.
    aliases: [s]
    preconditions:
      - sh: node -v
        msg: '{{.REQNPM}}'
    cmds:
      - pnpm run serve

  # Testing tasks
  test:
    desc: Run tests.
    aliases: [t]
    cmds:
      - pnpm run test
