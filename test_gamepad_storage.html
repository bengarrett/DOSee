<!DOCTYPE html>
<html>
<head>
    <title>Gamepad Storage Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Gamepad Storage Test</h1>
    <div id="testResults"></div>
    
    <script type="module">
        // Import the gamepad module
        import DOSeeGamepad, { gamepadConfigs } from './src/js/dosee-gamepad.js';
        
        async function runTests() {
            const resultsDiv = document.getElementById('testResults');
            
            function logResult(message, type = 'info') {
                const div = document.createElement('div');
                div.className = `test-result ${type}`;
                div.textContent = message;
                resultsDiv.appendChild(div);
            }
            
            try {
                // Test 1: Create gamepad instance
                logResult('Test 1: Creating gamepad instance...', 'info');
                const gamepad = new DOSeeGamepad();
                logResult('✓ Gamepad instance created', 'success');
                
                // Test 2: Initialize gamepad
                logResult('Test 2: Initializing gamepad...', 'info');
                const initialized = gamepad.init();
                logResult(`✓ Gamepad initialized: ${initialized}`, 'success');
                
                // Test 3: Check initial state
                logResult('Test 3: Checking initial state...', 'info');
                logResult(`Enabled: ${gamepad.enabled}, Layout: ${gamepad.config === gamepadConfigs.xbox ? 'xbox' : 'playstation'}`, 'info');
                
                // Test 4: Enable gamepad and save
                logResult('Test 4: Enabling gamepad and saving...', 'info');
                gamepad.enable();
                gamepad.saveSettings();
                logResult('✓ Gamepad enabled and settings saved', 'success');
                
                // Test 5: Change layout and save
                logResult('Test 5: Changing to PlayStation layout and saving...', 'info');
                gamepad.setConfig('playstation');
                gamepad.saveSettings();
                logResult('✓ Layout changed to PlayStation and settings saved', 'success');
                
                // Test 6: Create new instance and load settings
                logResult('Test 6: Creating new instance and loading settings...', 'info');
                const gamepad2 = new DOSeeGamepad();
                gamepad2.init();
                logResult(`✓ New instance loaded settings - Enabled: ${gamepad2.enabled}, Layout: ${gamepad2.config === gamepadConfigs.xbox ? 'xbox' : 'playstation'}`, 'success');
                
                // Test 7: Disable and save
                logResult('Test 7: Disabling gamepad and saving...', 'info');
                gamepad2.disable();
                gamepad2.saveSettings();
                logResult('✓ Gamepad disabled and settings saved', 'success');
                
                // Test 8: Verify final state
                logResult('Test 8: Verifying final state...', 'info');
                const gamepad3 = new DOSeeGamepad();
                gamepad3.init();
                logResult(`✓ Final state - Enabled: ${gamepad3.enabled}, Layout: ${gamepad3.config === gamepadConfigs.xbox ? 'xbox' : 'playstation'}`, 'success');
                
                // Cleanup
                localStorage.removeItem('doseeGamepadSettings');
                logResult('✓ Test cleanup completed', 'success');
                
                logResult('All tests completed successfully!', 'success');
                
            } catch (error) {
                logResult(`✗ Test failed: ${error.message}`, 'error');
                console.error(error);
            }
        }
        
        runTests();
    </script>
</body>
</html>
